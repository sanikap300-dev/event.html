<body>

    <h1>Count App</h1>
    <div id="count">0</div>

    <button onclick="addition()" id="cadetblue">+</button>
    <button onclick="reset()">reset</button>
    <button onclick="subtraction()" id="cadetblue">-</button>
    
    <script>

        let count=0;

        function addition(){
            count++;
            document.getElementById("count").innerText=count;
        }

        function repeat(){
            count=0;
            document.getElementById("count").innerText=count;
        }

        function subtraction(){
            count-;
            document.getElementById("count").innerText=count;
        }

           // let inputid=document.getElementById("myinput").value;

    </script>
